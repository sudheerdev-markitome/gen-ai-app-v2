name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gen-ai-frontend/package-lock.json

      - name: Build Frontend
        working-directory: gen-ai-frontend
        run: |
          npm install
          npm run build
        env:
          VITE_SENTRY_FRONTEND_DSN: ${{ secrets.VITE_SENTRY_FRONTEND_DSN }}

      - name: Prepare Frontend for Transfer
        run: |
          tar -czf dist.tar.gz -C gen-ai-frontend/dist .

      - name: Upload Frontend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: "dist.tar.gz"
          target: "~/gen-ai-app/"

      - name: Connect to server and deploy
        uses: appleboy/ssh-action@v1.2.0
        timeout-minutes: 30
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            echo "--- Navigating to project directory ---"
            cd ~/gen-ai-app

            echo "--- Pulling latest backend code ---"
            git fetch --all
            git reset --hard origin/main

            echo "--- Deploying frontend files (pre-built) ---"
            sudo rm -rf /var/www/html/*
            sudo mkdir -p /var/www/html/
            sudo tar -xzf dist.tar.gz -C /var/www/html/
            rm dist.tar.gz

            echo "--- Deploying Nginx API proxy snippet ---"
            sudo mkdir -p /etc/nginx/snippets
            sudo cp nginx-api-proxy.conf /etc/nginx/snippets/markitome-api-proxy.conf

            # Find the active site config file
            SITE_CONF=""
            for f in /etc/nginx/sites-available/markitome.ai /etc/nginx/sites-available/markitome /etc/nginx/sites-available/default; do
              if [ -f "$f" ]; then
                SITE_CONF="$f"
                break
              fi
            done
            echo "Using site config: $SITE_CONF"

            # Inject include if not already there
            if [ -n "$SITE_CONF" ] && ! sudo grep -q "markitome-api-proxy.conf" "$SITE_CONF"; then
              echo "Adding proxy snippet include to $SITE_CONF..."
              sudo sed -i "s|location / {|include snippets/markitome-api-proxy.conf;\n    location / {|" "$SITE_CONF"
            fi

            echo "--- Cleaning up Docker resources ---"
            sudo docker system prune -af || true

            echo "--- Building backend container (no cache) ---"
            sudo docker-compose build --no-cache

            echo "--- Starting containers ---"
            sudo docker-compose up -d

            echo "--- Testing and reloading Nginx ---"
            sudo nginx -t && sudo systemctl reload nginx

            echo "--- Deploy complete! ---"